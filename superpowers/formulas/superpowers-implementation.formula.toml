description = """
Superpowers implementation of the public implement methodology contract.
"""
formula = "superpowers-implementation"
version = 1
contract = "graph.v2"
extends = ["implement"]
target_required = true
internal = true

[vars]
[vars.implementation_target]
description = "Superpowers task implementation role."
default = "superpowers.implementer"

[[steps]]
id = "drain-separate"
title = "Drain Superpowers development in separate sessions"
needs = ["prepare"]
condition = "{{drain_policy}} == separate"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/superpowers-implementation/drain-separate.md"

[steps.drain]
context = "separate"
formula = "superpowers-development"
member_access = "exclusive"

[[steps]]
id = "drain-same-session"
title = "Drain Superpowers development in one shared session"
needs = ["prepare"]
condition = "{{drain_policy}} == same-session"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/superpowers-implementation/drain-same-session.md"

[steps.drain]
context = "shared"
formula = "superpowers-development-item"
on_item_failure = "skip_remaining"
member_access = "exclusive"

[steps.drain.item]
single_lane = true

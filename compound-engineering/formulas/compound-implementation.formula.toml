description = """
Compound Engineering implementation of the public implement methodology contract.
"""
formula = "compound-implementation"
version = 1
contract = "graph.v2"
extends = ["implement"]
target_required = true
internal = true

[vars]
[vars.implementation_target]
description = "Compound Engineering task implementation role."
default = "compound-engineering.ce-work"

[[steps]]
id = "drain-separate"
title = "Drain Compound Engineering work in separate sessions"
needs = ["prepare"]
condition = "{{drain_policy}} == separate"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/compound-implementation/drain-separate.md"

[steps.drain]
context = "separate"
formula = "compound-work"
member_access = "exclusive"

[[steps]]
id = "drain-same-session"
title = "Drain Compound Engineering work in one shared session"
needs = ["prepare"]
condition = "{{drain_policy}} == same-session"
metadata = { "gc.run_target" = "{{implementation_target}}" }
description_file = "../assets/workflows/compound-implementation/drain-same-session.md"

[steps.drain]
context = "shared"
formula = "compound-work-item"
on_item_failure = "skip_remaining"
member_access = "exclusive"

[steps.drain.item]
single_lane = true

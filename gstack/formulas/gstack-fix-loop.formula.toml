description = """
gstack implementation of the fix-loop-base methodology contract.
"""
formula = "gstack-fix-loop"
version = 1
contract = "graph.v2"
extends = ["fix-loop-base"]
target_required = false
internal = true

[vars]
[vars.implementation_formula]
description = "gstack implementation formula used for fix work."
default = "gstack-implementation"

[vars.code_review_formula]
description = "gstack review formula used after fixes."
default = "gstack-review"

[vars.implementation_target]
description = "gstack task implementation role."
default = "gstack.implementer"

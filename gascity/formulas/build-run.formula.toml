description = """
Compatibility alias for the historical build-run formula name.

New packs should extend `build-base` or launch `build-basic`. This wrapper
keeps existing references to `build-run` working without making the old name a
cataloged public workflow.
"""
formula = "build-run"
extends = ["build-basic"]
version = 1
contract = "graph.v2"
target_required = true
internal = true
